apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-microservice
  namespace: api
  labels:
    app: api-microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-microservice
  template:
    metadata:
      labels:
        app: api-microservice
    spec:
      containers:
        - name: api-microservice
          image: nestorx211/k8s-microservice-python:1.0.1
          ports:
            - containerPort: 8000
          startupProbe:
            initialDelaySeconds: 15
            failureThreshold: 3
            periodSeconds: 15
            httpGet:
              path: /live
              port: 8000
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            httpGet:
              path: /live
              port: 8000
          livenessProbe:
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
            httpGet:
              path: /live
              port: 8000
          resources:
            requests:
              cpu: 200m
              memory: 500Mi
            limits:
              cpu: 600m
              memory: 1Gi
