name: Build DEV image

on:
  push:
    branches:
      - develop
    paths:
      - "api-microservice/**"

jobs:
  build-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Generar tag con SHA
        id: tag
        run: echo "IMAGE_TAG=dev-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen DEV
        uses: docker/build-push-action@v5
        with:
          context: ./api-microservice
          file: ./api-microservice/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-microservice:${{ steps.tag.outputs.IMAGE_TAG }}
          build-args: |
            APP_ENV=dev

      - name: Instalar yq
        run: |
          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Actualizar image tag en values.dev.yaml
        run: |
          yq e '.image.tag = "${{ steps.tag.outputs.IMAGE_TAG }}"' -i \
            k8s_server/k8s/charts/api-microservice/values.dev.yaml

      - name: Commit y push values.dev.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s_server/k8s/charts/api-microservice/values.dev.yaml
          git commit -m "ci: update dev image tag to ${{ steps.tag.outputs.IMAGE_TAG }}"
          git push
